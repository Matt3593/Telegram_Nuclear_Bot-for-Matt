name: nuclear news bot

on:
  schedule:
    - cron: "3 21 * * *"   # KST 06:00
    - cron: "4 23 * * *"   # KST 08:00
    - cron: "7 10 * * *"   # KST 19:00
    - cron: "3 12 * * *"   # KST 21:00
    - cron: "8 14 * * *"   # KST 23:00
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python nuclearnewsbot.py
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
